<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkedPad - A Fast Shareable Notepad</title>
<meta property="og:title" content="LinkedPad - A Fast Shareable Notepad">
<meta property="og:description" content="Create anonymous notes with short links. No sign-up required. Share instantly.">
<meta property="og:image" content="__BASE__/og-image.svg">
<meta property="og:url" content="__BASE__/">
<meta property="og:type" content="website">
<meta property="og:site_name" content="LinkedPad">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="LinkedPad - A Fast Shareable Notepad">
<meta name="twitter:description" content="Create anonymous notes with short links. No sign-up required. Share instantly.">
<meta name="twitter:image" content="__BASE__/og-image.svg">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="navbar">
  <a href="/" class="logo">LinkedPad <span class="logo-tagline">An Anonymous Fast Shareable Notepad</span></a>
  <div class="nav-links">
    <a href="/search" title="Search through shared notes">Search</a>
    <a href="/favorites" title="View your favorited notes">Favorites</a>
  </div>
  <button id="theme-btn" class="toolbar-btn" title="Switch between light and dark theme">🌙</button>
</nav>
<main class="editor-page">
  <div class="toolbar">
    <input type="text" id="title-input" class="title-input" placeholder="Title (optional)" maxlength="200" title="Give your note a title">
    <div class="toolbar-right">
      <label class="password-toggle" title="Enable password protection for this note">
        <span class="lock-icon">🔒</span>
        <input type="checkbox" id="password-enable">
        <span>Password</span>
      </label>
      <input type="password" id="password-input" class="password-input" placeholder="Min 4 chars" disabled title="Enter a password (minimum 4 characters)">
      <button id="mic-btn" class="toolbar-btn" title="Use speech-to-text to enter content (Chrome/Edge only)" style="display:none">🎤</button>
      <button id="fav-btn" class="toolbar-btn" title="Add this note to your favorites">☆</button>
      <button id="duplicate-btn" class="toolbar-btn" title="Create a copy of this note">📋</button>
      <button id="download-btn" class="toolbar-btn" title="Download this note as a text file">⬇</button>
      <button id="copy-link-btn" class="toolbar-btn" title="Copy the page URL to clipboard">🔗</button>
      <button id="primary-btn" class="btn btn-primary" title="Create a shareable link for this note">Share</button>
    </div>
  </div>
  <textarea id="note-content" class="note-editor" placeholder="Write your note here..." maxlength="50000" title="Type or paste your note content here"></textarea>
</main>

<div id="toast" class="toast hidden"></div>

<script src="/js/theme.js"></script>
<script src="/js/speech.js"></script>
<script src="/js/favorites.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
