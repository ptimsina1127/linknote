<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search - LinkedPad</title>
<meta property="og:title" content="Search Notes - LinkedPad">
<meta property="og:description" content="Search through shared anonymous notes on LinkedPad.">
<meta property="og:image" content="__BASE__/og-image.svg">
<meta property="og:url" content="__BASE__/search">
<meta property="og:type" content="website">
<meta property="og:site_name" content="LinkedPad">
<meta name="twitter:card" content="summary_large_image">
<link rel="stylesheet" href="/css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>
<nav class="navbar">
  <a href="/" class="logo" title="Go to homepage">LinkedPad <span class="logo-tagline">An Anonymous Fast Shareable Notepad</span></a>
  <div class="nav-links">
    <a href="/search" class="active" title="Search through shared notes">Search</a>
    <a href="/favorites" title="View your favorited notes">Favorites</a>
  </div>
  <button id="theme-btn" class="toolbar-btn" title="Switch between light and dark theme">🌙</button>
</nav>
<main class="page-center">
  <h1>Search Notes</h1>
  <div class="search-bar">
    <input type="text" id="search-input" placeholder="Search notes..." autofocus title="Type words to search notes. Multiple words = all must match">
    <button id="sort-btn" class="toolbar-btn" title="Toggle between newest first and oldest first">↓ Newest</button>
  </div>
  <div id="search-results" class="notes-list">
    <p class="hint">Start typing to search notes</p>
  </div>
  <div id="pagination" class="pagination hidden"></div>
</main>

<script src="/js/theme.js"></script>
<script src="/js/favorites.js"></script>
<script src="/js/search.js"></script>
</body>
</html>
