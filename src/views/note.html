<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>__OG_TITLE__</title>
<meta name="description" content="__OG_DESC__">
<meta property="og:title" content="__OG_TITLE__">
<meta property="og:description" content="__OG_DESC__">
<meta property="og:image" content="__OG_IMAGE__">
<meta property="og:url" content="__OG_URL__">
<meta property="og:type" content="website">
<meta property="og:site_name" content="LinkedPad">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="__OG_TITLE__">
<meta name="twitter:description" content="__OG_DESC__">
<meta name="twitter:image" content="__OG_IMAGE__">
<link rel="canonical" href="__OG_URL__">
<script type="application/ld+json">__JSON_LD__</script>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="navbar">
    <a href="/" class="logo">LinkedPad <span class="logo-tagline">An Anonymous and Shareable Online Notepad</span></a>
    <span id="autosave-indicator"></span>
    <div class="nav-links">
    <a href="/search" title="Search through shared notes">Search</a>
    <a href="/favorites" title="View your favorited notes">Favorites</a>
  </div>
  <button id="theme-btn" class="toolbar-btn" title="Switch between light and dark theme">🌙</button>
</nav>
<main class="note-view-page">
  <div id="unlock-prompt" class="unlock-prompt hidden">
    <div class="unlock-box">
      <h2>This note is password protected</h2>
      <input type="password" id="unlock-password" placeholder="Enter password" title="Enter the password to view this note">
      <button id="unlock-btn" class="btn btn-primary" title="Verify password to unlock note content">Unlock</button>
      <p id="unlock-error" class="error hidden">Incorrect password</p>
    </div>
  </div>
  <div id="note-container" class="hidden">
    <div class="toolbar">
      <input type="text" id="title-input" class="title-input" placeholder="Title (optional)" maxlength="200" title="Edit the note title">
      <div class="toolbar-right">
        <span class="pw-wrapper">
          <button id="password-btn" class="toolbar-btn" title="Protect this note with a password">🔒</button>
          <input type="password" id="password-input" class="pw-inline-input" placeholder="Password (min 4 chars)" maxlength="100">
          <button id="pw-reveal-btn" class="pw-reveal-btn" title="Show password">👁</button>
        </span>
        <button id="mic-btn" class="toolbar-btn" title="Use speech-to-text to enter content (Chrome/Edge only)" style="display:none">🎤</button>
        <button id="fav-btn" class="toolbar-btn" title="Add this note to your favorites">☆</button>
        <button id="duplicate-btn" class="toolbar-btn" title="Create a copy of this note">📋</button>
        <button id="download-btn" class="toolbar-btn" title="Download this note as a text file">⬇</button>
        <button id="share-btn" class="btn btn-primary" title="Share this note">Share</button>
      </div>
    </div>
    <textarea id="note-content" class="note-editor" placeholder="Loading..." maxlength="50000" title="Edit your note content here"></textarea>
    <p id="note-date" class="note-date"></p>
  </div>

  <div id="share-modal" class="modal hidden">
    <div class="modal-content">
      <h2>Share this note</h2>
      <p>Anyone with this link can view your note</p>
      <div class="result-link">
        <input type="text" id="share-link" readonly>
        <button id="copy-share-link" class="btn btn-primary" title="Copy to clipboard">Copy</button>
      </div>
      <div class="share-buttons">
        <a id="share-twitter" href="#" target="_blank" rel="noopener" class="btn" title="Share on X (Twitter)">𝕏</a>
        <a id="share-facebook" href="#" target="_blank" rel="noopener" class="btn" title="Share on Facebook">fb</a>
        <a id="share-whatsapp" href="#" target="_blank" rel="noopener" class="btn" title="Share on WhatsApp">WA</a>
        <a id="share-linkedin" href="#" target="_blank" rel="noopener" class="btn" title="Share on LinkedIn">in</a>
        <a id="share-reddit" href="#" target="_blank" rel="noopener" class="btn" title="Share on Reddit">Reddit</a>
      </div>
      <button id="close-share-modal" class="btn" title="Close">Close</button>
    </div>
  </div>
</main>

<div id="toast" class="toast hidden"></div>

<script src="/js/theme.js"></script>
<script src="/js/speech.js"></script>
<script src="/js/favorites.js"></script>
<script src="/js/note.js"></script>
</body>
</html>
